<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweet Shots - Postres Artesanales</title>
  <!-- Google Fonts: Satisfy (logo/brand), DM Sans (body), JetBrains Mono (precios sats) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Satisfy&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

  <!-- HEADER: Se mantiene fijo arriba en toda la app -->
  <header class="header">
    <div class="header-inner">

      <!-- Logo: imagen real + texto con Satisfy -->
      <a href="#" class="logo" data-view="catalog">
        <img src="/images/sweet-shots-logo.png" alt="Sweet Shots" class="logo-img">
        <span class="logo-text">Sweet Shots</span>
      </a>

      <!-- Navegacion principal -->
      <nav class="nav">
        <a href="#" class="nav-link active" data-view="catalog">Catálogo</a>
        <a href="#" class="nav-link" data-view="cart">
          Carrito
          <span id="cart-badge" class="cart-badge" style="display:none;">0</span>
        </a>
        <a href="#" class="nav-link" data-view="account">Mi Cuenta</a>
      </nav>

      <!-- Boton de login con Nostr -->
      <button id="nostr-login-btn" class="btn-login">
        ⚡ Login Nostr
      </button>

    </div>
  </header>

  <!-- Degradé de fondo rosa→turquesa (sutil, detrás del contenido) -->
  <div class="bg-gradient"></div>

  <!-- CONTENEDOR PRINCIPAL: Aca se cargan las vistas dinamicamente -->
  <main id="app" class="main-content">
    <!-- El contenido se inyecta desde JavaScript -->
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p><span class="footer-brand">Sweet Shots</span> · Buenos Aires · Hecho con ☕ y <span class="footer-btc">₿</span></p>
    <p class="footer-sub">Pagos con Bitcoin Lightning ⚡ | Hackathon FOUNDATIONS 2026</p>
  </footer>

  <!-- Punto de entrada de JavaScript -->
  <script type="module" src="/src/app.js"></script>
</body>
</html>
